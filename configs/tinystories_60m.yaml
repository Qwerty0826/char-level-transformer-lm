# 60M-parameter TinyStoriesV2 pretrain config (Colab Pro A100, bfloat16).
# Architecture: depth-over-width, Llama-3-style GQA (5:1 query/kv ratio).
# Tokenizer: BPE 16K with chat-template special tokens baked in.

# Data
train_data: data/tinystories_v2_tokens_train.npy
val_data:   data/tinystories_v2_tokens_val.npy

# Tokenizer (specials baked in at BPE training time — no vocab resize ever)
vocab_size: 16000

# Model architecture
context_length: 512
d_model:        640        # multiple of 128
num_layers:     10         # depth > width at this scale
num_heads:      10         # d_k = 64, tensor-core aligned
num_kv_heads:   2          # 5:1 GQA ratio (Llama-3 style)
d_ff:           1728       # ~8/3 × 640, rounded to multiple of 64
theta:          10000.0
tie_weights:    true

# Optimizer
lr_max:        3.0e-4      # lower than the 17M run (bigger model)
lr_min:        3.0e-5
warmup_steps:  500
total_steps:   20000
batch_size:    64
grad_clip:     1.0
weight_decay:  0.1
beta1:         0.9
beta2:         0.95
grad_accum_steps: 1

# Compute
dtype:           bfloat16
compile:         true
compile_backend: inductor

# Logging / checkpointing
log_interval:        100
val_interval:        500
val_batches:         20
checkpoint_dir:      checkpoints/base_60m
checkpoint_interval: 500     # frequent for Colab session-resilience
log_csv:             logs/base_60m_train.csv
