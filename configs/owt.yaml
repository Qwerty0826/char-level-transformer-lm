# OpenWebText training config (Google Colab T4/V100 or H100)
# Full leaderboard run: 1.5 hours on H100

# Data
train_data: data/owt_tokens_train.npy
val_data:   data/owt_tokens_val.npy

# Tokenizer
vocab_size: 32000

# Model architecture
context_length: 256
d_model:        512
num_layers:     4
num_heads:      16
d_ff:           1344
theta:          10000.0
tie_weights:    true

# Optimizer
lr_max:       6.0e-4
lr_min:       6.0e-5
warmup_steps: 400
total_steps:  5000
batch_size:   64
grad_clip:    1.0
weight_decay: 0.1
beta1:        0.9
beta2:        0.95
grad_accum_steps: 1

# Compute
dtype:   bfloat16
compile: true
compile_backend: inductor   # CUDA/inductor; change to aot_eager for MPS

# Logging
log_interval:        100
val_interval:        500
val_batches:         20
checkpoint_dir:      checkpoints/owt
checkpoint_interval: 1000
log_csv:             logs/owt_train.csv
